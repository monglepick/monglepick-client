# =========================================
# 몽글픽 React Client 운영 배포 워크플로우 (Production CD)
# =========================================
# 트리거:
#   - main 브랜치 push → 자동 운영 배포
#   - workflow_dispatch → 수동 재배포
#
# 배포 흐름:
#   1) GitHub Actions 호스팅 러너에서 lint + Vite 빌드
#   2) 빌드 결과 dist/ 를 VM1(210.109.15.187) 에 rsync (직접 SSH, bastion 불필요)
#   3) VM1 네이티브 Nginx reload (컨테이너 아님)
#
# ⚠ 정책:
#   - VM1 Nginx 는 compose 가 아닌 시스템 서비스(systemd) 로 운영
#   - dist/ 경로: /home/ubuntu/monglepick-client/dist/ (Nginx root 로 매핑되어 있다고 가정)
#   - 운영 환경변수(.env.production) 는 레포 secrets(VITE_*_PROD) 로 주입
#
# 사전 세팅 (docs/CI_CD_운영배포_가이드.md 참고):
#   - GitHub Secrets: DEPLOY_SSH_KEY, VM1_HOST, VM_USER, VITE_API_BASE_URL_PROD 등
#   - VM1 ubuntu 계정의 authorized_keys 에 DEPLOY_SSH_KEY 공개키 등록
#   - VM1 sudoers: `ubuntu ALL=(ALL) NOPASSWD: /usr/sbin/nginx -s reload, /usr/bin/systemctl reload nginx`

name: CD (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-prod-client
  cancel-in-progress: false

env:
  REMOTE_DIST_DIR: /home/ubuntu/monglepick-client/dist

jobs:
  # ─── 1. 빌드 ───
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (production)
        env:
          # Vite 는 VITE_* prefix env 를 빌드 시 주입 — 실제 사용 변수는 secrets 에서 개별 관리
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PROD }}
          VITE_APP_ENV: production
        run: npm run build

      # 다음 job 으로 dist 전달 (rsync 는 deploy job 에서)
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: dist/
          retention-days: 7

  # ─── 2. VM1 배포 ───
  deploy:
    name: Deploy to VM1
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: dist/

      - name: Setup SSH (직접 VM1)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<EOF
          Host vm1
            HostName ${{ secrets.VM1_HOST }}
            User ${{ secrets.VM_USER }}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking accept-new
          EOF

      - name: Rsync dist to VM1
        run: |
          # --delete: VM1 의 이전 빌드 잔재 제거
          # dist/ 자체 내용만 동기화 (trailing slash 주의)
          ssh vm1 "mkdir -p ${{ env.REMOTE_DIST_DIR }}"
          rsync -az --delete \
            -e "ssh" \
            dist/ \
            vm1:${{ env.REMOTE_DIST_DIR }}/

      - name: Nginx reload
        run: |
          # nginx -s reload 는 마스터 프로세스 시그널 — 무중단
          ssh vm1 bash -s <<'EOF'
          set -euo pipefail
          if sudo -n nginx -s reload 2>/dev/null; then
            echo "✅ Nginx reloaded (nginx -s reload)"
          elif sudo -n systemctl reload nginx 2>/dev/null; then
            echo "✅ Nginx reloaded (systemctl)"
          else
            echo "⚠ sudo reload 실패 — 설정 문법 체크만 수행"
            sudo nginx -t
            exit 1
          fi
          EOF

      - name: Smoke test
        run: |
          # 도메인 직타 (/health 는 VM1 Nginx 자체 엔드포인트)
          for i in 1 2 3; do
            if curl -sf "http://${{ secrets.VM1_HOST }}/health" > /dev/null 2>&1; then
              echo "✅ Nginx health OK"
              exit 0
            fi
            sleep 3
          done
          echo "❌ Smoke test 실패"
          exit 1
